# Limit analysis to the frontend source files that ship with the app.
sonar.inclusions=src/**/*.ts,src/**/*.tsx

# Mark the in-repo test directory so Sonar separates test code from production code.
sonar.tests=src
sonar.test.inclusions=src/tests/**/*

# Reuse the coverage and execution reports produced by Jest in CI.
sonar.javascript.lcov.reportPaths=.coverage/lcov.info
sonar.testExecutionReportPaths=test-report.xml

# Test files should not count against application coverage targets.
sonar.coverage.exclusions=src/tests/**/*
